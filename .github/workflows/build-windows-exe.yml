name: Launch Quote Converter Web App

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: "How long to keep the web app available (5-120 minutes)"
        required: false
        default: "30"

jobs:
  launch-web-app:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install cloudflared
        run: |
          curl -L --retry 3 --retry-delay 2 \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          chmod +x /tmp/cloudflared
          sudo mv /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start Flask app
        run: |
          nohup python app.py > flask.log 2>&1 &
          sleep 8
          if ! pgrep -f "python app.py" >/dev/null; then
            echo "Flask app failed to start"
            cat flask.log
            exit 1
          fi

      - name: Start public tunnel
        run: |
          nohup cloudflared tunnel --no-autoupdate --url http://127.0.0.1:8000 > tunnel.log 2>&1 &
          URL=""
          for i in {1..30}; do
            URL=$(grep -Eo "https://[-a-zA-Z0-9]+\.trycloudflare\.com" tunnel.log | head -n 1 || true)
            if [ -n "$URL" ]; then
              echo "PUBLIC_URL=$URL" >> "$GITHUB_ENV"
              break
            fi
            sleep 2
          done

          if [ -z "$URL" ]; then
            echo "Failed to get public URL from cloudflared"
            cat tunnel.log
            exit 1
          fi

      - name: Normalize session duration
        run: |
          SESSION="${{ github.event.inputs.session_minutes }}"
          if ! [[ "$SESSION" =~ ^[0-9]+$ ]]; then
            SESSION=30
          fi
          if [ "$SESSION" -lt 5 ]; then
            SESSION=5
          fi
          if [ "$SESSION" -gt 120 ]; then
            SESSION=120
          fi
          echo "SESSION_MINUTES=$SESSION" >> "$GITHUB_ENV"

      - name: Publish launch link
        run: |
          {
            echo "## Quote Converter is live"
            echo
            echo "Open this URL to use the app: ${PUBLIC_URL}"
            echo
            echo "- The app session is configured to auto-close after ${SESSION_MINUTES} minutes."
            echo "- When the workflow ends, this temporary URL will stop working."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep app alive for configured session window
        run: |
          echo "Keeping app available for ${SESSION_MINUTES} minutes..."
          sleep "$((SESSION_MINUTES * 60))"
